services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    expose:
      - "5432"
    restart: always

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    restart: always

  app:
    build: .
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - db
      - redis
    expose:
      - "8000"
    command: >
      sh -c "sleep 10 &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    restart: always

  celery:
    build: .
    env_file:
      - .env
    depends_on:
      - redis
      - db
    command: celery -A config worker -l INFO
    restart: always

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/staticfiles
      - media_volume:/media
    depends_on:
      - app
    restart: always

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
